<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WD33 Course Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
    <!-- Notification Bar -->
    <div id="notification" class="notification-bar" role="alert"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center mb-5">
                <a href="index.html" class="sidebar-logo justify-content-center mb-0">
                    <i class="bi bi-mortarboard-fill"></i>
                    <span>WD33 REG</span>
                </a>
                <p class="text-secondary mt-2">Future of Education Registration</p>
            </div>

            <div class="auth-tabs" id="authTabs" role="tablist">
                <button class="auth-tab active" id="login-trigger" data-bs-toggle="pill" data-bs-target="#login-tab">Login</button>
                <button class="auth-tab" id="register-trigger" data-bs-toggle="pill" data-bs-target="#register-tab">Register</button>
            </div>

            <div class="tab-content">
                <!-- Login Form -->
                <div class="tab-pane fade show active" id="login-tab">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-primary-neon w-100 py-3 mt-4">
                            <i class="bi bi-box-arrow-in-right"></i>
                            <span>Access Dashboard</span>
                        </button>
                    </form>
                </div>

                <!-- Register Form -->
                <div class="tab-pane fade" id="register-tab">
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="regName" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="regEmail" class="form-control" placeholder="john@example.com" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Student ID</label>
                            <input type="text" id="regStudentId" class="form-control" placeholder="ST12345" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters" minlength="6" required>
                        </div>
                        <button type="submit" class="btn-primary-neon w-100 py-3 mt-4" style="background: linear-gradient(135deg, var(--accent-cyan) 0%, #008fa0 100%); box-shadow: var(--glow-cyan);">
                            <i class="bi bi-person-plus"></i>
                            <span>Create Account</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-5">
                <p style="color: rgba(255,255,255,0.2); font-size: 0.8rem;">
                    Admin Access: admin@university.edu / admin123
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const user = initSession();
            if (user) {
                window.location.href = user.role === 'ADMIN' ? 'admin.html' : 'student.html';
            }

            // Custom tab switching logic for styling
            const triggers = document.querySelectorAll('.auth-tab');
            triggers.forEach(t => {
                t.addEventListener('shown.bs.tab', function (e) {
                    triggers.forEach(tr => tr.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });
        });
    </script>
</body>

</html>
